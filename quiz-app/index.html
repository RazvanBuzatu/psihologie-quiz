<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Psihologie Quiz" />
    <meta name="description" content="Aplicație pentru pregătirea examenului de licență în Psihologie" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Psihologie Quiz</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        // When a newer service worker takes control, reload once to load the
        // new version. Guarded so it never loops and never fires on the very
        // first install. NOTE: progress lives in localStorage, which a reload
        // (or any cache change) never clears — so updates never lose progress.
        var hadController = !!navigator.serviceWorker.controller
        var refreshing = false
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (refreshing || !hadController) return
          refreshing = true
          window.location.reload()
        })
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').then(function (reg) {
            // Proactively check for a new version each time the app opens.
            reg.update()
          }).catch(function () {})
        })
      }
    </script>
  </body>
</html>
